name: Publish .net redirect to GitHub Pages

# Serves samuel.wibrow.net via GitHub Pages with a path-preserving JS
# redirect to wibrow.dev. Decoupled from the main build workflow
# so changes to the site don't redeploy the redirect.

on:
  push:
    branches: ["main"]
    paths:
      - "redirect-site/**"
      - ".github/workflows/legacy-redirect.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: blog
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload redirect site
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./redirect-site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
